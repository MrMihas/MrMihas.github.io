<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Universal Image Converter & Compressor</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f9f9f9; }
        .container { max-width: 700px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .drop {
            border: 2px dashed #aaa;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            background: #fafafa;
            transition: background 0.2s;
        }
        .drop:hover { background: #f0f0f0; }
        button { padding: 10px 20px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        img { width: 80px; height: 80px; object-fit: cover; margin: 5px; border-radius: 4px; border: 1px solid #ddd; }
        #preview { display: flex; flex-wrap: wrap; margin-top: 15px; }
        .control-group { margin-bottom: 15px; }
        label { font-weight: bold; margin-right: 10px; }
        select, input[type="range"] { vertical-align: middle; }
    </style>
</head>

<body>
<div class="container">

    <h2>Image Converter & Compressor</h2>

    <div class="drop" id="drop">
        Drop images here or click to select
        <input type="file" id="fileInput" multiple accept="image/jpeg, image/png, image/webp" hidden>
    </div>
    
    <div class="control-group">
        <label>Filename Mode:</label>
        <label><input type="radio" name="filenameMode" value="original" checked> Keep original filename</label>
        <label><input type="radio" name="filenameMode" value="random"> Generate unique filename</label>
    </div>

    <div class="control-group">
        <label for="formatSelect">Output Format:</label>
        <select id="formatSelect">
            <option value="image/webp">WebP</option>
            <option value="image/jpeg">JPEG</option>
            <option value="image/png">PNG (Lossless)</option>
        </select>
    </div>

    <div class="control-group" id="qualityGroup">
        <label>Quality: <span id="qVal">0.8</span></label>
        <input type="range" id="quality" min="0.1" max="1" step="0.1" value="0.8">
    </div>

    <br>
    <button id="convertBtn">Convert & Download ZIP</button>

    <div id="preview"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<script>
// =======================
// UI & ЕЛЕМЕНТИ КЕРУВАННЯ
// =======================
const fileInput = document.getElementById('fileInput');
const drop = document.getElementById('drop');
const preview = document.getElementById('preview');
const qualitySlider = document.getElementById('quality');
const qVal = document.getElementById('qVal');
const convertBtn = document.getElementById('convertBtn');
const formatSelect = document.getElementById('formatSelect');
const qualityGroup = document.getElementById('qualityGroup');

let files = [];

// Ініціалізація відображення якості
qVal.textContent = qualitySlider.value;

qualitySlider.addEventListener('input', () => {
    qVal.textContent = qualitySlider.value;
});

// Скрипт приховування повзунка якості для PNG
formatSelect.addEventListener('change', () => {
    if (formatSelect.value === 'image/png') {
        qualityGroup.style.display = 'none';
    } else {
        qualityGroup.style.display = 'block';
    }
});

// Кліки та Drag'n'Drop події
drop.addEventListener('click', () => fileInput.click());
drop.addEventListener('dragover', (e) => e.preventDefault());
drop.addEventListener('drop', (e) => {
    e.preventDefault();
    setFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', () => {
    setFiles(fileInput.files);
});


// =======================
// ОБРОБКА ФАЙЛІВ
// =======================
function setFiles(selectedFiles) {
    // Дозволяємо на вхід JPG, PNG та WebP
    files = Array.from(selectedFiles).filter(file =>
        ['image/jpeg', 'image/png', 'image/jpg', 'image/webp'].includes(file.type)
    );

    if (!files.length) {
        alert("Only JPG, PNG and WebP files are allowed");
        return;
    }

    renderPreview(files);
}

function renderPreview(files) {
    preview.innerHTML = '';

    files.forEach((file) => {
        const img = document.createElement('img');
        const url = URL.createObjectURL(file);

        img.src = url;
        img.onload = () => URL.revokeObjectURL(url);

        preview.appendChild(img);
    });
}


// =======================
// КОНВЕРТАЦІЯ ТА СТВОРЕННЯ ZIP
// =======================
convertBtn.addEventListener('click', async () => {
    try {
        if (!files.length) {
            alert("No files selected");
            return;
        }

        const zip = new JSZip();
        const quality = parseFloat(qualitySlider.value);
        
        // Визначаємо обраний формат та розширення
        const targetMime = formatSelect.value; 
        const targetExt = targetMime.split('/')[1]; 
        
        const batchId = generateBatchId();
        const mode = getFileNameMode();

        // Захист інтерфейсу (блокуємо кнопку на час обробки)
        convertBtn.disabled = true;
        convertBtn.textContent = "Converting...";

        for (let i = 0; i < files.length; i++) {
            // Викликаємо універсальну функцію конвертації
            const blob = await convertToFormat(files[i], targetMime, quality);

            if (!blob) continue;

            // Генеруємо ім'я файлу відповідно до обраного розширення
            const newName = generateFileName(files[i], i, batchId, mode, targetExt);

            zip.file(newName, blob);
        }

        const zipBlob = await zip.generateAsync({ type: "blob" });
        saveAs(zipBlob, "converted_images.zip");

    } catch (err) {
        console.error("ZIP ERROR:", err);
        alert("Conversion failed. Check console.");
    } finally {
        // Повертаємо кнопку в робочий стан
        convertBtn.disabled = false;
        convertBtn.textContent = "Convert & Download ZIP";
    }
});


// =======================
// РЕЖИМИ ІМЕН ФАЙЛІВ
// =======================
function getFileNameMode() {
    const el = document.querySelector('input[name="filenameMode"]:checked');
    return el ? el.value : 'random';
}

function generateFileName(file, index, batchId, mode, ext) {
    // Коригуємо відображення розширення для jpeg
    const fileExt = ext === 'jpeg' ? 'jpg' : ext;

    if (mode === 'original') {
        const base = file.name.replace(/\.[^/.]+$/, '');
        return `${base}.${fileExt}`;
    }

    const seq = String(index + 1).padStart(4, '0');
    const rand = randomString(8);

    return `${batchId}_${seq}_${rand}.${fileExt}`;
}


// =======================
// ДОПОМІЖНІ ФУНКЦІЇ
// =======================
function generateBatchId() {
    return Date.now().toString(36);
}

function randomString(len = 8) {
    const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
    let out = "";
    for (let i = 0; i < len; i++) {
        out += chars[Math.floor(Math.random() * chars.length)];
    }
    return out;
}


// =======================
// УНІВЕРСАЛЬНИЙ РУШІЙ КОНВЕРТАЦІЇ
// =======================
function convertToFormat(file, mimeType, quality) {
    return new Promise((resolve) => {
        const img = new Image();
        const url = URL.createObjectURL(file);

        img.onload = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            canvas.width = img.width;
            canvas.height = img.height;

            // Налаштування для максимальної якості згладжування при рендерингу
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = "high";

            ctx.drawImage(img, 0, 0);

            // Динамічно передаємо mimeType (image/webp, image/jpeg або image/png)
            canvas.toBlob((blob) => {
                URL.revokeObjectURL(url);
                resolve(blob);
            }, mimeType, quality); 
        };

        img.onerror = () => {
            URL.revokeObjectURL(url);
            resolve(null);
        };

        img.src = url;
    });
}
</script>
</body>
</html>
