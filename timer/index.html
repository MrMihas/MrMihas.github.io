<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WebP Converter</title>
<style>
body { font-family: Arial; padding: 20px; }
.container { max-width: 700px; margin: auto; }
.drop {
  border: 2px dashed #aaa;
  padding: 40px;
  text-align: center;
  margin-bottom: 20px;
}
button { padding: 10px 20px; cursor: pointer; }
img { width: 80px; margin: 5px; }
#preview { display: flex; flex-wrap: wrap; }
</style>
</head>

<body>
<div class="container">

<h2>JPEG/PNG → WebP Converter</h2>

<div class="drop" id="drop">
Drop images here or click to select
<input type="file" id="fileInput" multiple accept="image/*" hidden>
</div>
	
	<label>
    <input type="radio" name="filenameMode" value="original" >
    Залишити ім'я файлу (Keep original filename)
</label>

<label>
    <input type="radio" name="filenameMode" value="random" checked>
    Згенерувати унікальне ім'я (Generate unique filename)
</label>
<br><br>

<label>Quality: <span id="qVal">0.8</span></label>
<input type="range" id="quality" min="0.1" max="1" step="0.1" value="0.8">

<br><br>

<button id="convertBtn">Конвертувати та завантажити ZIP</button>

<div id="preview"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script >
const fileInput = document.getElementById('fileInput');
const drop = document.getElementById('drop');
const preview = document.getElementById('preview');
const qualitySlider = document.getElementById('quality');
const qVal = document.getElementById('qVal');
const convertBtn = document.getElementById('convertBtn');

let files = [];

// UI init
qVal.textContent = qualitySlider.value;

qualitySlider.addEventListener('input', () => {
    qVal.textContent = qualitySlider.value;
});

// open file picker
drop.addEventListener('click', () => fileInput.click());

// drag over
drop.addEventListener('dragover', (e) => e.preventDefault());

// drop handler
drop.addEventListener('drop', (e) => {
    e.preventDefault();
    setFiles(e.dataTransfer.files);
});

// file input change
fileInput.addEventListener('change', () => {
    setFiles(fileInput.files);
});


// =======================
// FILE HANDLING
// =======================

function setFiles(selectedFiles) {
    files = Array.from(selectedFiles).filter(file =>
        ['image/jpeg', 'image/png', 'image/jpg'].includes(file.type)
    );

    if (!files.length) {
        alert("Only JPG and PNG files are allowed");
        return;
    }

    renderPreview(files);
}

function renderPreview(files) {
    preview.innerHTML = '';

    files.forEach((file) => {
        const img = document.createElement('img');
        const url = URL.createObjectURL(file);

        img.src = url;
        img.onload = () => URL.revokeObjectURL(url);

        preview.appendChild(img);
    });
}


// =======================
// CONVERT + ZIP
// =======================

convertBtn.addEventListener('click', async () => {
    try {
        if (!files.length) {
            alert("No files selected");
            return;
        }

        const zip = new JSZip();
        const quality = parseFloat(qualitySlider.value);
        const batchId = generateBatchId();

        const mode = getFileNameMode();

        for (let i = 0; i < files.length; i++) {
            const webpBlob = await convertToWebP(files[i], quality);

            if (!webpBlob) continue;

            const newName = generateFileName(files[i], i, batchId, mode);

            zip.file(newName, webpBlob);
        }

        const zipBlob = await zip.generateAsync({ type: "blob" });
        saveAs(zipBlob, "converted_images.zip");

    } catch (err) {
        console.error("ZIP ERROR:", err);
        alert("Conversion failed. Check console.");
    }
});


// =======================
// FILE NAME MODE
// =======================

function getFileNameMode() {
    const el = document.querySelector('input[name="filenameMode"]:checked');
    return el ? el.value : 'random';
}

function generateFileName(file, index, batchId, mode) {
    if (mode === 'original') {
        const base = file.name.replace(/\.[^/.]+$/, '');
        return `${base}.webp`;
    }

    const seq = String(index + 1).padStart(4, '0');
    const rand = randomString(8);

    return `${batchId}_${seq}_${rand}.webp`;
}


// =======================
// HELPERS
// =======================

function generateBatchId() {
    return Date.now().toString(36);
}

function randomString(len = 8) {
    const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
    let out = "";

    for (let i = 0; i < len; i++) {
        out += chars[Math.floor(Math.random() * chars.length)];
    }

    return out;
}


// =======================
// CONVERT
// =======================

function convertToWebP(file, quality) {
    return new Promise((resolve) => {
        const img = new Image();
        const url = URL.createObjectURL(file);

        img.onload = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            canvas.width = img.width;
            canvas.height = img.height;

            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = "high";

            ctx.drawImage(img, 0, 0);

            canvas.toBlob((blob) => {
                URL.revokeObjectURL(url);
                resolve(blob);
            }, 'image/webp', quality);
        };

        img.onerror = () => {
            URL.revokeObjectURL(url);
            resolve(null);
        };

        img.src = url;
    });
}
	
</script>
</body>
</html>
